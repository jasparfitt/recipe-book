name: Shared NPM Package Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'shared/package.json'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Setup repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: |
          cd shared
          npm ci
      
      - name: Publish package
        run: |
          cd shared
          npm publish